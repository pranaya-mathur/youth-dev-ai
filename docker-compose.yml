services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: youth
      POSTGRES_PASSWORD: youth
      POSTGRES_DB: youth
    ports:
      - "5433:5432"
    volumes:
      - youth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youth -d youth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  youth_pgdata:
