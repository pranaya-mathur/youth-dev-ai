# All-in-one stack for a single host (VM / small pilot). Use managed Postgres + split services for real production.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: youth
      POSTGRES_PASSWORD: youth
      POSTGRES_DB: youth
    volumes:
      - youth_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youth -d youth"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://youth:youth@db:5432/youth
      # Browser + server-side fetches from the web container during SSR (if you add SSR later)
      ALLOWED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000,http://web:3000
      ALLOW_LLM_DEMO: ${ALLOW_LLM_DEMO:-false}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-}
      MAINTENANCE_SECRET: ${MAINTENANCE_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL the *browser* uses to reach the API (same machine: host-published port)
        NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  youth_pgdata_prod:
