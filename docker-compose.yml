services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: youth
      POSTGRES_PASSWORD: youth
      POSTGRES_DB: youth
    ports:
      - "5432:5432"
    volumes:
      - youth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youth -d youth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  youth_pgdata:
